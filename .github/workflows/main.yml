name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: built-bundle
          path: |
            Koha/Plugin/Xyz/Paulderscheid/StaffRoster/staff-roster.js
            Koha/Plugin/Xyz/Paulderscheid/StaffRoster/staff-roster.css
          if-no-files-found: error
          retention-days: 7

  prove:
    name: Plugin prove suite (Koha main)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin
      - uses: actions/download-artifact@v4
        with:
          name: built-bundle
          path: plugin/Koha/Plugin/Xyz/Paulderscheid/StaffRoster/

      # Koha source clone is the "SYNC_REPO" mounted by koha-testing-docker
      # at /kohadevbox/koha. Cache it across runs keyed by the week so we
      # don't re-clone ~50 MB on every push, but still refresh weekly to
      # follow main. Cache miss falls back to a fresh shallow clone.
      - name: Compute Koha cache key
        id: cache-key
        run: |
          WEEK=$(date -u +%Y-%U)
          echo "week=$WEEK" >> "$GITHUB_OUTPUT"

      - name: Cache Koha clone
        id: koha-cache
        uses: actions/cache@v4
        with:
          path: kohaclone
          key: koha-main-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            koha-main-

      - name: Clone Koha main (cache miss / refresh)
        if: steps.koha-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf kohaclone
          git clone --branch main --single-branch --depth 1 \
            https://github.com/Koha-Community/Koha.git kohaclone

      - name: Refresh shallow clone (cache hit, but pull main tip)
        if: steps.koha-cache.outputs.cache-hit == 'true'
        working-directory: kohaclone
        run: |
          git fetch --depth 1 origin main
          git reset --hard origin/main

      - name: Fetch ktd compose + defaults
        run: |
          sudo sysctl -w vm.max_map_count=262144
          wget -q -O docker-compose.yml \
            https://gitlab.com/koha-community/koha-testing-docker/raw/main/docker-compose.yml
          mkdir -p env
          wget -q -O env/defaults.env \
            https://gitlab.com/koha-community/koha-testing-docker/raw/main/env/defaults.env
          cp env/defaults.env .env
          # ktd's compose template reads these from the env; without them
          # the koha service tries to bind-mount empty paths and exits
          # with "invalid spec: :/kohadevbox/koha".
          {
            echo "SYNC_REPO=${GITHUB_WORKSPACE}/kohaclone"
            echo "LOCAL_USER_ID=$(id -u)"
            echo "KOHA_IMAGE=main"
            echo "KOHA_INTRANET_URL=http://127.0.0.1:8081"
            echo "KOHA_MARC_FLAVOUR=marc21"
            echo "RUN_TESTS_AND_EXIT=no"
          } >> .env

      # ktd images sit in the koha-community gitlab registry. The `main`
      # tag is mutable, so cache the saved tarball weekly and refresh on
      # cache miss. docker save+load shaves ~3 min off the cold pull.
      - name: Cache ktd images
        id: ktd-image-cache
        uses: actions/cache@v4
        with:
          path: ~/ktd-images.tar.gz
          key: ktd-images-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            ktd-images-

      - name: Load cached ktd images
        if: steps.ktd-image-cache.outputs.cache-hit == 'true'
        run: gunzip -c ~/ktd-images.tar.gz | docker load

      - name: Pull ktd images (cache miss)
        if: steps.ktd-image-cache.outputs.cache-hit != 'true'
        run: |
          docker compose -p koha pull --quiet
          # Save every image the compose stack references so the next
          # run's cache hit covers koha + db + memcached + es alike.
          docker compose -p koha config --images | xargs docker save | gzip > ~/ktd-images.tar.gz

      - name: Start koha-testing-docker
        run: docker compose -p koha up --detach

      - name: Wait for ktd ready signal
        run: |
          # ktd's entrypoint emits this exact line as the last step of
          # its bootstrap, after koha-create + plack + zebra + workers
          # are all live. Polling for this is more reliable than
          # grep'ing Plack's own logs (which Starman writes elsewhere
          # in some Koha builds) or hitting koha-mysql (which races
          # the koha-create instance setup). 240*5s = 20 min ceiling
          # for the rare slow runner.
          for i in $(seq 1 240); do
            if docker compose -p koha logs koha 2>&1 | grep -q "koha-testing-docker has started up"; then
              echo "Koha ready after ${i} polls (~$((i*5))s)"
              break
            fi
            if [ "$i" = "240" ]; then
              echo "Timed out waiting for ktd ready signal"
              docker compose -p koha logs koha | tail -200
              exit 1
            fi
            sleep 5
          done

      - name: Sync plugin into the container
        working-directory: plugin
        run: |
          docker exec koha-koha-1 rm -rf /var/lib/koha/kohadev/plugins/Koha /var/lib/koha/kohadev/plugins/t
          docker cp Koha koha-koha-1:/var/lib/koha/kohadev/plugins/Koha
          docker cp t    koha-koha-1:/var/lib/koha/kohadev/plugins/t

      - name: Run prove suite
        run: |
          docker exec koha-koha-1 sh -c '
            cd /var/lib/koha/kohadev/plugins &&
            KOHA_CONF=/etc/koha/sites/kohadev/koha-conf.xml \
              prove t/00-load.t t/rrule.t t/self_service.t t/swap_ownership.t \
                    t/swap_respond.t t/exceptions.t t/additional_fields.t \
                    t/conflict_check.t t/visibility.t
          '

      - name: Tear down
        if: always()
        run: docker compose -p koha down --volumes

  release:
    name: Package + GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, prove]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v3
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Build bundle
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build .kpz
        run: just package

      - name: Locate kpz
        id: kpz
        run: |
          KPZ="$(ls -1 koha-plugin-staff-roster-*.kpz | head -1)"
          echo "path=$KPZ" >> "$GITHUB_OUTPUT"
          echo "Found $KPZ"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.kpz.outputs.path }}
            CHANGELOG.md
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
