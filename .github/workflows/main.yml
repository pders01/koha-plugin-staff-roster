name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run check
      - uses: actions/upload-artifact@v4
        with:
          name: built-bundle
          path: |
            Koha/Plugin/Xyz/Paulderscheid/StaffRoster/staff-roster.js
            Koha/Plugin/Xyz/Paulderscheid/StaffRoster/staff-roster.css
          if-no-files-found: error
          retention-days: 7

  prove:
    name: Plugin prove suite (Koha main)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: built-bundle
          path: Koha/Plugin/Xyz/Paulderscheid/StaffRoster/

      - name: Stand up koha-testing-docker against main
        run: |
          sudo sysctl -w vm.max_map_count=262144
          wget -q -O docker-compose.yml \
            https://gitlab.com/koha-community/koha-testing-docker/raw/main/docker-compose.yml
          mkdir -p env
          wget -q -O env/defaults.env \
            https://gitlab.com/koha-community/koha-testing-docker/raw/main/env/defaults.env
          cp env/defaults.env .env
          echo "KOHA_IMAGE=main" >> .env
          docker compose -p koha pull --quiet
          docker compose -p koha up --detach
          # Wait for the Koha container to finish koha-create + plack boot.
          # Poll instead of a fixed sleep so the action exits as soon as
          # the plugins dir is ready.
          for i in $(seq 1 60); do
            if docker exec koha-koha-1 test -d /var/lib/koha/kohadev/plugins; then
              echo "Koha ready after ${i} polls"
              break
            fi
            sleep 5
          done

      - name: Sync plugin into the container
        run: |
          docker exec koha-koha-1 rm -rf /var/lib/koha/kohadev/plugins/Koha /var/lib/koha/kohadev/plugins/t
          docker cp Koha koha-koha-1:/var/lib/koha/kohadev/plugins/Koha
          docker cp t    koha-koha-1:/var/lib/koha/kohadev/plugins/t

      - name: Run prove suite
        run: |
          docker exec koha-koha-1 sh -c '
            cd /var/lib/koha/kohadev/plugins &&
            KOHA_CONF=/etc/koha/sites/kohadev/koha-conf.xml \
              prove t/00-load.t t/rrule.t t/self_service.t t/swap_ownership.t \
                    t/swap_respond.t t/exceptions.t t/additional_fields.t \
                    t/conflict_check.t t/visibility.t
          '

      - name: Tear down
        if: always()
        run: docker compose -p koha down --volumes

  release:
    name: Package + GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, prove]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v3

      - name: Build bundle
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build .kpz
        run: just package

      - name: Locate kpz
        id: kpz
        run: |
          KPZ="$(ls -1 koha-plugin-staff-roster-*.kpz | head -1)"
          echo "path=$KPZ" >> "$GITHUB_OUTPUT"
          echo "Found $KPZ"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.kpz.outputs.path }}
            CHANGELOG.md
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
